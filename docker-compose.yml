services:
  db-init:
    image: postgres:16-alpine
    env_file:
      - ./.env
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: >
      sh -lc "apk add --no-cache bash curl jq >/dev/null &&
      bash scripts/demo/init-demo-db.sh || true"
    restart: "no"

  backend:
    build:
      context: ./automation-platform/backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      PORT: 3847
      WA_AUTH_ROOT: /app/data/wa_sessions
    depends_on:
      db-init:
        condition: service_completed_successfully
    volumes:
      - wa_sessions:/app/data/wa_sessions
    expose:
      - "3847"
    restart: unless-stopped

  frontend:
    build:
      context: ./automation-platform/frontend
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped

volumes:
  wa_sessions:
