services:
  backend:
    build:
      context: ./automation-platform/backend
      dockerfile: Dockerfile
    container_name: BrandoChat-backend
    env_file:
      - ./automation-platform/backend/.env
    environment:
      PORT: 3847
      WA_AUTH_ROOT: /app/data/wa_sessions
    volumes:
      - wa_sessions:/app/data/wa_sessions
    ports:
      - "3847:3847"
    restart: unless-stopped

  frontend:
    build:
      context: ./automation-platform/frontend
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: BrandoChat-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  wa_sessions:
