services:
  backend:
    build:
      context: ./automation-platform/backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      PORT: 3847
      WA_AUTH_ROOT: /app/data/wa_sessions
    volumes:
      - wa_sessions:/app/data/wa_sessions
    expose:
      - "3847"
    restart: unless-stopped

  frontend:
    build:
      context: ./automation-platform/frontend
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped

volumes:
  wa_sessions:
